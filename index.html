<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #FF1744;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .mode-indicator {
            display: inline-block;
            background: #FF1744;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mode-select {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .subtitle {
            font-size: 1.3em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .button {
            padding: 16px 32px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            width: 100%;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .button-master {
            background: #FF1744;
            color: #fff;
        }

        .button-follow {
            background: #00BCD4;
            color: #fff;
            margin-top: 10px;
        }

        .button-stop {
            background: #FF5252;
            color: #fff;
            margin-top: 20px;
        }

        .button-secondary {
            background: #424242;
            color: #fff;
            padding: 12px 24px;
            font-size: 0.95em;
            margin: 8px;
        }

        .button-small {
            font-size: 0.7em;
            opacity: 0.9;
            display: block;
            margin-top: 5px;
            font-weight: normal;
        }

        .divider {
            margin: 25px 0;
            opacity: 0.5;
            font-size: 0.9em;
        }

        .follow-section {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .input {
            flex: 1;
            padding: 12px;
            font-size: 1.3em;
            font-weight: bold;
            text-align: center;
            background: #1a1f3a;
            border: 2px solid #FF1744;
            color: #fff;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 23, 68, 0.5);
        }

        .active-tracking {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .map {
            flex: 1;
            border-radius: 8px;
            border: 2px solid #FF1744;
            min-height: 400px;
        }

        .info-panel {
            background: rgba(15, 23, 42, 0.95);
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #00BCD4;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .info-col {
            flex: 1;
            text-align: center;
        }

        .info-title {
            margin: 0 0 5px 0;
            font-size: 0.85em;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .code-box {
            font-size: 1.8em;
            font-weight: bold;
            background: #FF1744;
            padding: 12px 20px;
            border-radius: 8px;
            letter-spacing: 3px;
            font-family: 'Courier New', monospace;
        }

        .distance-box {
            font-size: 1.4em;
            font-weight: bold;
            color: #00BCD4;
        }

        .compass {
            font-size: 2em;
            margin: 10px 0;
        }

        .buttons-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
        }

        .error {
            background: #FF5252;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9em;
        }

        .hidden {
            display: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .controls .button {
            flex: 1;
            min-width: 150px;
            margin-bottom: 0;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }
            .follow-section {
                flex-direction: column;
            }
            .button {
                padding: 14px 24px;
                font-size: 1em;
            }
            .info-row {
                flex-direction: column;
            }
            .controls {
                flex-direction: column;
            }
            .controls .button {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>LIVE TRACKER</h1>
            <div id="modeIndicator" class="mode-indicator hidden"></div>
        </div>

        <div class="content">
            <!-- MODE SELECT -->
            <div id="modeSelect" class="mode-select">
                <p class="subtitle">Start your adventure</p>
                
                <button class="button button-master" onclick="startMaster()">
                    📡 START TRACKING
                    <span class="button-small">Share your location</span>
                </button>

                <div class="divider">OR</div>

                <div class="follow-section">
                    <input type="text" maxlength="4" placeholder="XXXX" id="inputCode" class="input" onkeyup="this.value = this.value.toUpperCase()">
                    <button class="button button-follow" onclick="startFollowing()">👁️ FOLLOW</button>
                </div>

                <div id="error" class="error hidden"></div>
            </div>

            <!-- ACTIVE TRACKING -->
            <div id="activeTracking" class="active-tracking hidden">
                <div id="map" class="map"></div>
                
                <div class="info-panel">
                    <div id="masterInfo">
                        <div class="info-row">
                            <div class="info-col">
                                <h2 class="info-title">Your Tracking Code</h2>
                                <div class="code-box" id="codeBox">----</div>
                            </div>
                        </div>
                        <p style="opacity: 0.8; margin: 0; font-size: 0.9em;">📋 Share this code with followers</p>
                    </div>

                    <div id="followerInfo" class="hidden">
                        <div class="info-row">
                            <div class="info-col">
                                <h2 class="info-title">Following</h2>
                                <div class="code-box" id="followerCodeBox">----</div>
                            </div>
                            <div class="info-col">
                                <h2 class="info-title">Distance</h2>
                                <div class="distance-box" id="distanceBox">-</div>
                            </div>
                        </div>
                        <div class="compass" id="compassArrow" style="opacity: 0.7;">↑</div>
                        <p style="opacity: 0.8; margin: 0; font-size: 0.9em;">🧭 Direction to Master</p>
                        <div class="buttons-group">
                            <button class="button button-secondary" onclick="viewTrack()">📍 View Track</button>
                        </div>
                    </div>
                </div>

                <div class="controls">
                    <div id="masterControls">
                        <button class="button button-secondary" onclick="downloadGPX()">📥 Download GPX</button>
                        <button class="button button-stop" onclick="stopTracking()">⛔ STOP</button>
                    </div>
                    <div id="followerControls" class="hidden">
                        <button class="button button-stop" onclick="stopTracking()">⛔ STOP</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://tracker-app-5ab7d-default-rtdb.europe-west1.firebasedatabase.app"
        };

        let currentMode = null;
        let currentCode = '';
        let mapInstance = null;
        let masterMarker = null;
        let followerMarker = null;
        let polyline = null;
        let locations = [];
        let masterLocations = [];
        let watchId = null;
        let followInterval = null;
        let trackVisible = false;

        function generateCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 4; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        async function sendToFirebase(code, lat, lng) {
            try {
                const url = `${firebaseConfig.databaseURL}/tracking/${code}.json`;
                await fetch(url, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        latitude: lat,
                        longitude: lng,
                        timestamp: Date.now()
                    })
                });
            } catch (err) {
                console.error('Firebase error:', err);
            }
        }

        async function fetchMasterLocation(code) {
            try {
                const url = `${firebaseConfig.databaseURL}/tracking/${code}.json`;
                const response = await fetch(url);
                const data = await response.json();
                if (data) {
                    return { lat: data.latitude, lng: data.longitude };
                }
            } catch (err) {
                console.error('Fetch error:', err);
            }
            return null;
        }

        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return (R * c).toFixed(2);
        }

        function calculateBearing(lat1, lng1, lat2, lng2) {
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const y = Math.sin(dLng) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                      Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLng);
            const bearing = Math.atan2(y, x) * 180 / Math.PI;
            return (bearing + 360) % 360;
        }

        function getCompassArrow(bearing) {
            const arrows = ['↑', '↗', '→', '↘', '↓', '↙', '←', '↖'];
            const index = Math.round(bearing / 45) % 8;
            return arrows[index];
        }

        function initializeMap(isMaster, code) {
            setTimeout(() => {
                const mapDiv = document.getElementById('map');
                
                if (mapInstance) {
                    mapInstance.remove();
                }

                mapInstance = L.map(mapDiv).setView([52.04, 5.67], 13);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap',
                    maxZoom: 19
                }).addTo(mapInstance);

                if (isMaster) {
                    watchId = navigator.geolocation.watchPosition(
                        (position) => {
                            const { latitude, longitude } = position.coords;
                            
                            mapInstance.setView([latitude, longitude], 16);

                            if (masterMarker) {
                                masterMarker.setLatLng([latitude, longitude]);
                            } else {
                                masterMarker = L.circleMarker([latitude, longitude], {
                                    radius: 10,
                                    fillColor: '#FF1744',
                                    color: '#fff',
                                    weight: 2,
                                    opacity: 1,
                                    fillOpacity: 0.9
                                }).addTo(mapInstance).bindPopup('📍 You (Master)');
                            }

                            masterLocations.push([latitude, longitude]);

                            if (masterLocations.length > 1) {
                                if (polyline) {
                                    mapInstance.removeLayer(polyline);
                                }
                                polyline = L.polyline(masterLocations, {
                                    color: '#FF1744',
                                    weight: 3,
                                    opacity: 0.7,
                                    dashArray: '5, 5'
                                }).addTo(mapInstance);
                            }

                            sendToFirebase(code, latitude, longitude);
                        },
                        (err) => showError(`GPS error: ${err.message}`),
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );
                } else {
                    watchId = navigator.geolocation.watchPosition(
                        (position) => {
                            const { latitude, longitude } = position.coords;
                            
                            if (followerMarker) {
                                followerMarker.setLatLng([latitude, longitude]);
                            } else {
                                followerMarker = L.circleMarker([latitude, longitude], {
                                    radius: 8,
                                    fillColor: '#2196F3',
                                    color: '#fff',
                                    weight: 2,
                                    opacity: 1,
                                    fillOpacity: 0.9
                                }).addTo(mapInstance).bindPopup('📍 You');
                            }
                        },
                        (err) => console.error('Follower GPS:', err),
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );

                    const updateMasterMarker = async () => {
                        const location = await fetchMasterLocation(code);
                        if (location) {
                            if (masterMarker) {
                                masterMarker.setLatLng([location.lat, location.lng]);
                            } else {
                                masterMarker = L.circleMarker([location.lat, location.lng], {
                                    radius: 10,
                                    fillColor: '#FF1744',
                                    color: '#fff',
                                    weight: 2,
                                    opacity: 1,
                                    fillOpacity: 0.9
                                }).addTo(mapInstance).bindPopup('🏍️ Master');
                            }

                            masterLocations.push([location.lat, location.lng]);

                            if (masterLocations.length > 1 && trackVisible) {
                                if (polyline) {
                                    mapInstance.removeLayer(polyline);
                                }
                                polyline = L.polyline(masterLocations, {
                                    color: '#FF1744',
                                    weight: 3,
                                    opacity: 0.7
                                }).addTo(mapInstance);
                            }

                            if (followerMarker) {
                                const followerLatLng = followerMarker.getLatLng();
                                const distance = calculateDistance(followerLatLng.lat, followerLatLng.lng, location.lat, location.lng);
                                const bearing = calculateBearing(followerLatLng.lat, followerLatLng.lng, location.lat, location.lng);
                                
                                document.getElementById('distanceBox').textContent = distance + ' km';
                                document.getElementById('compassArrow').textContent = getCompassArrow(bearing);
                            }

                            mapInstance.setView([location.lat, location.lng], 15);
                        }
                    };

                    updateMasterMarker();
                    followInterval = setInterval(updateMasterMarker, 3000);
                }
            }, 100);
        }

        function viewTrack() {
            trackVisible = !trackVisible;
            if (trackVisible) {
                if (masterLocations.length > 1) {
                    if (polyline) {
                        mapInstance.removeLayer(polyline);
                    }
                    polyline = L.polyline(masterLocations, {
                        color: '#FF1744',
                        weight: 3,
                        opacity: 0.7
                    }).addTo(mapInstance);
                }
                event.target.textContent = '🗺️ Hide Track';
            } else {
                if (polyline) {
                    mapInstance.removeLayer(polyline);
                }
                event.target.textContent = '📍 View Track';
            }
        }

        function downloadGPX() {
            if (masterLocations.length < 2) {
                showError('Need at least 2 points to export');
                return;
            }

            let gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="LiveTracker">
  <trk>
    <name>Track ${currentCode}</name>
    <trkseg>`;

            masterLocations.forEach(([lat, lng]) => {
                gpx += `
      <trkpt lat="${lat}" lon="${lng}">
        <time>${new Date().toISOString()}</time>
      </trkpt>`;
            });

            gpx += `
    </trkseg>
  </trk>
</gpx>`;

            const blob = new Blob([gpx], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `track-${currentCode}.gpx`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function startMaster() {
            const code = generateCode();
            currentCode = code;
            currentMode = 'master';
            masterLocations = [];
            trackVisible = false;

            document.getElementById('modeSelect').classList.add('hidden');
            document.getElementById('activeTracking').classList.remove('hidden');
            document.getElementById('modeIndicator').textContent = '📡 MASTER MODE';
            document.getElementById('modeIndicator').classList.remove('hidden');
            document.getElementById('codeBox').textContent = code;
            document.getElementById('masterInfo').classList.remove('hidden');
            document.getElementById('followerInfo').classList.add('hidden');
            document.getElementById('masterControls').classList.remove('hidden');
            document.getElementById('followerControls').classList.add('hidden');

            initializeMap(true, code);
        }

        function startFollowing() {
            const code = document.getElementById('inputCode').value.toUpperCase();
            
            if (code.length !== 4) {
                showError('Code must be 4 characters');
                return;
            }

            currentCode = code;
            currentMode = 'follower';
            masterLocations = [];
            trackVisible = false;

            document.getElementById('modeSelect').classList.add('hidden');
            document.getElementById('activeTracking').classList.remove('hidden');
            document.getElementById('modeIndicator').textContent = '👁️ FOLLOWING';
            document.getElementById('modeIndicator').classList.remove('hidden');
            document.getElementById('followerCodeBox').textContent = code;
            document.getElementById('masterInfo').classList.add('hidden');
            document.getElementById('followerInfo').classList.remove('hidden');
            document.getElementById('masterControls').classList.add('hidden');
            document.getElementById('followerControls').classList.remove('hidden');

            initializeMap(false, code);
        }

        function stopTracking() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
            }
            if (followInterval) {
                clearInterval(followInterval);
            }
            if (mapInstance) {
                mapInstance.remove();
            }

            currentMode = null;
            currentCode = '';
            masterLocations = [];
            masterMarker = null;
            followerMarker = null;
            polyline = null;
            trackVisible = false;

            document.getElementById('activeTracking').classList.add('hidden');
            document.getElementById('modeSelect').classList.remove('hidden');
            document.getElementById('modeIndicator').classList.add('hidden');
            document.getElementById('inputCode').value = '';
            document.getElementById('error').classList.add('hidden');
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
