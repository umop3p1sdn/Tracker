<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Route Planner v3.2-debug</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: sans-serif; background: #0a0e27; }
        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

        /* Search box top-left */
        #searchWrap {
            position: absolute; top: 12px; left: 12px; right: 70px; z-index: 1000;
        }
        #searchBar {
            display: flex; align-items: center; gap: 8px;
            background: #0a0e27; border: 2px solid #00BCD4; border-radius: 10px;
            padding: 8px 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        #searchIcon { flex-shrink: 0; cursor: pointer; }
        #searchInput {
            flex: 1; border: none; background: transparent; color: #fff;
            font-size: 1em; outline: none;
        }
        #searchInput::placeholder { color: #889; }
        #results {
            margin-top: 6px; background: #0a0e27; border-radius: 10px;
            overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            display: none;
        }
        .result-item {
            padding: 10px 14px; color: #fff; cursor: pointer; font-size: 0.9em;
            border-bottom: 1px solid #1a2148;
        }
        .result-item:last-child { border-bottom: none; }
        .result-item:active { background: #1a2148; }

        /* Mode toggle: searching for start vs destination */
        #modeRow {
            display: flex; gap: 6px; margin-top: 6px;
        }
        .mode-btn {
            flex: 1; padding: 8px; border-radius: 8px; border: 2px solid #555;
            background: #e8e8ea; color: #1a1a2e; font-weight: bold; font-size: 0.8em;
            cursor: pointer;
        }
        .mode-btn.active { background: #00BCD4; color: #0a0e27; border-color: #00BCD4; }

        #profileRow { display: flex; gap: 6px; margin-top: 6px; }
        .prof-btn {
            flex: 1; padding: 8px; border-radius: 8px; border: 2px solid #555;
            background: #e8e8ea; color: #1a1a2e; font-weight: bold; font-size: 0.8em;
            cursor: pointer;
        }
        .prof-btn.active { background: #00BCD4; color: #0a0e27; border-color: #00BCD4; }

        /* Info bar bottom */
        #infoBar {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(10,14,39,0.92); color: #fff; padding: 12px 16px;
            font-size: 0.9em; display: none;
        }
        #infoBar b { color: #00BCD4; }
        #clearBtn {
            position: absolute; top: 12px; right: 12px; z-index: 1000;
            width: 48px; height: 48px; border-radius: 10px;
            background: #0a0e27; border: 2px solid #E91E63; color: #E91E63;
            font-size: 1.4em; cursor: pointer;
        }
        .leaflet-routing-marker { background: transparent; border: none; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="versionLabel" style="position:absolute; bottom:4px; right:6px; z-index:1000; font-family:sans-serif; font-size:10px; color:rgba(255,255,255,0.7); background:rgba(0,0,0,0.4); padding:2px 6px; border-radius:6px; pointer-events:none;">v3.2-debug</div>

    <div id="searchWrap">
        <div id="searchBar">
            <svg id="searchIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00BCD4" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
            <input id="searchInput" type="text" placeholder="Zoek adres of straat..." autocomplete="off">
        </div>
        <div id="modeRow">
            <button class="mode-btn active" id="modeStart" onclick="setSearchMode('start')">Start</button>
            <button class="mode-btn" id="modeVia" onclick="setSearchMode('via')">Tussen</button>
            <button class="mode-btn" id="modeDest" onclick="setSearchMode('dest')">Finish</button>
            <button class="mode-btn" id="useGps" onclick="useMyLocation()" style="flex:0 0 auto; border-color:#4CAF50; color:#4CAF50;">📍</button>
        </div>
        <div id="profileRow">
            <button class="prof-btn active" data-profile="car-fast" onclick="setProfile(this)">Snel</button>
            <button class="prof-btn" data-profile="rustig" onclick="setProfile(this)">Rustig</button>
            <button class="prof-btn" data-profile="neutraal" onclick="setProfile(this)">Neutraal</button>
        </div>
        <div id="detourRow" style="display:flex; gap:6px; margin-top:6px; align-items:center;">
            <input id="targetKm" type="number" inputmode="numeric" placeholder="km" style="width:56px; padding:8px; border-radius:8px; border:2px solid #555; background:#e8e8ea; color:#1a1a2e; font-size:0.9em; text-align:center;">
            <input id="targetPts" type="number" inputmode="numeric" placeholder="ptn" style="width:48px; padding:8px; border-radius:8px; border:2px solid #555; background:#e8e8ea; color:#1a1a2e; font-size:0.9em; text-align:center;">
            <button onclick="generateDetour()" style="flex:1; padding:8px; border-radius:8px; border:2px solid #555; background:#e8e8ea; color:#1a1a2e; font-weight:bold; font-size:0.8em; cursor:pointer;">Genereer omweg</button>
        </div>
        <div id="results"></div>
    </div>

    <button id="clearBtn" onclick="clearAll()" title="Wissen">✕</button>

    <div id="infoBar"></div>

    <!-- Tap-on-map menu -->
    <div id="tapMenu" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:1200; background:#0a0e27; border:2px solid #00BCD4; border-radius:12px; padding:16px; flex-direction:column; gap:8px; box-shadow:0 4px 16px rgba(0,0,0,0.6); min-width:200px;">
        <div style="color:#00BCD4; font-weight:bold; text-align:center; margin-bottom:4px;">Punt toevoegen als:</div>
        <button onclick="tapChoose('start')" style="padding:12px; border-radius:8px; border:2px solid #9E9E9E; background:transparent; color:#bbb; font-weight:bold; font-size:1em; cursor:pointer;">Start</button>
        <button onclick="tapChoose('via')" style="padding:12px; border-radius:8px; border:2px solid #9C27B0; background:transparent; color:#ce93d8; font-weight:bold; font-size:1em; cursor:pointer;">Tussen (slim)</button>
        <button onclick="tapChoose('achteraan')" style="padding:12px; border-radius:8px; border:2px solid #9C27B0; background:transparent; color:#ce93d8; font-weight:bold; font-size:1em; cursor:pointer;">Achteraan</button>
        <button onclick="tapChoose('dest')" style="padding:12px; border-radius:8px; border:2px solid #000; color:#000; font-weight:bold; font-size:1em; cursor:pointer; background:#eee;">Finish 🏁</button>
        <div style="display:flex; gap:6px; align-items:center;">
            <input id="nogoKm" type="number" inputmode="decimal" placeholder="km" value="2" style="width:60px; padding:12px; border-radius:8px; border:2px solid #FF1744; background:#0a0e27; color:#fff; font-size:1em; text-align:center;">
            <button onclick="tapChoose('nogo')" style="flex:1; padding:12px; border-radius:8px; border:2px solid #FF1744; background:transparent; color:#FF5252; font-weight:bold; font-size:1em; cursor:pointer;">Vermijden ⛔</button>
        </div>
        <button onclick="tapCancel()" style="padding:8px; border-radius:8px; border:none; background:transparent; color:#889; font-size:0.85em; cursor:pointer;">Annuleer</button>
    </div>

    <script>
        // ─── Map setup (same tiles as the tracker) ───
        const map = L.map('map', { zoomControl: true }).setView([52.04, 5.66], 13); // Ede default
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19, attribution: '© OpenStreetMap'
        }).addTo(map);
        map.on('click', onMapTap);

        let startPoint = null;      // {lat, lng, label}
        let destPoint = null;       // {lat, lng, label}
        let viaPoints = [];         // [{lat,lng,label,marker}] tussenpunten, in routevolgorde
        let nogoZones = [];         // [{lat,lng,radius,marker,circle}] te vermijden gebieden
        let viaMarkers = [];
        let startMarker = null, destMarker = null, routeLine = null;
        let searchMode = 'start';   // which point the search fills: start | dest | via
        let searchTimer = null;
        let selectedProfile = 'car-fast';   // UI-keuze: car-fast | rustig | bochtig

        // Vertaal de UI-keuze naar de echte BRouter-parameters.
        function brouterParams() {
            if (selectedProfile === 'rustig') {
                // car-vario met snelweg vermijden (echte autowegen, geen fietspad)
                return 'profile=car-vario&profile:avoid_motorways=1';
            }
            if (selectedProfile === 'neutraal') {
                // car-vario zonder voorkeur: noch snelweg zoeken noch mijden → via's leiden
                return 'profile=car-vario';
            }
            return 'profile=car-fast';   // Snel = snelste tijdpad
        }
        let pendingTap = null;      // {lat,lng} while the Start/Finish/Via menu is open
        let hasFitOnce = false;     // alleen 1e route inzoomen, daarna zoom/positie behouden
        let lastRouteCoords = null; // laatste route-coördinaten (voor 'snappen' van eigen via's)
        let lastTurnSpots = [];     // DIAGNOSE: laatst gevonden keerplekken
        let diagMarkers = [];       // DIAGNOSE: rode stipjes op de kaart

        // ─── Marker icons ───
        function pinIcon(color) {
            return L.divIcon({
                className: 'pin-marker',
                html: `<svg width="30" height="40" viewBox="0 0 24 32"><path d="M12 0C5.4 0 0 5.4 0 12c0 8 12 20 12 20s12-12 12-20C24 5.4 18.6 0 12 0z" fill="${color}" stroke="#fff" stroke-width="1.5"/><circle cx="12" cy="12" r="4.5" fill="#fff"/></svg>`,
                iconSize: [30, 40], iconAnchor: [15, 40], popupAnchor: [0, -38]
            });
        }
        function flagIcon() {
            return L.divIcon({
                className: 'flag-marker',
                html: `<svg width="30" height="40" viewBox="0 0 24 32"><line x1="4" y1="2" x2="4" y2="32" stroke="#000" stroke-width="2"/><path d="M4 3 h16 v11 h-16 z" fill="#fff" stroke="#000" stroke-width="1"/><path d="M4 3 h4 v4 h-4 z M12 3 h4 v4 h-4 z M8 7 h4 v4 h-4 z M16 7 h4 v4 h-4 z M4 11 h4 v3 h-4 z M12 11 h4 v3 h-4 z" fill="#000"/></svg>`,
                iconSize: [30, 40], iconAnchor: [4, 32], popupAnchor: [10, -30]
            });
        }
        function nogoIcon() {
            return L.divIcon({
                className: 'nogo-marker',
                html: `<svg width="28" height="28" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#FF1744" stroke="#fff" stroke-width="2"/><rect x="5" y="10.5" width="14" height="3" fill="#fff"/></svg>`,
                iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -14]
            });
        }
        function onMapTap(e) {
            pendingTap = { lat: e.latlng.lat, lng: e.latlng.lng };
            document.getElementById('tapMenu').style.display = 'flex';
        }
        function tapChoose(kind) {
            document.getElementById('tapMenu').style.display = 'none';
            if (!pendingTap) return;
            const { lat, lng } = pendingTap;
            const label = `(${lat.toFixed(4)}, ${lng.toFixed(4)})`;
            if (kind === 'start') setStart(lat, lng, label, false);
            else if (kind === 'dest') setDest(lat, lng, label);
            else if (kind === 'via') addVia(lat, lng, label, true);       // slim
            else if (kind === 'achteraan') addVia(lat, lng, label, false); // achteraan
            else if (kind === 'nogo') {
                const km = parseFloat(document.getElementById('nogoKm').value) || 2;
                addNogo(lat, lng, km);
            }
            pendingTap = null;
            maybeRoute();
        }
        function tapCancel() {
            document.getElementById('tapMenu').style.display = 'none';
            pendingTap = null;
        }

        function setProfile(btn) {
            document.querySelectorAll('.prof-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedProfile = btn.dataset.profile;
            // recalculate if a route already exists
            if (startPoint && destPoint) maybeRoute();
        }

        function setSearchMode(mode) {
            searchMode = mode;
            document.getElementById('modeStart').classList.toggle('active', mode === 'start');
            document.getElementById('modeVia').classList.toggle('active', mode === 'via');
            document.getElementById('modeDest').classList.toggle('active', mode === 'dest');
            const ph = mode === 'start' ? 'Zoek startadres...'
                     : mode === 'via' ? 'Zoek tussenpunt...'
                     : 'Zoek bestemming...';
            document.getElementById('searchInput').placeholder = ph;
        }

        // ─── Address search via Photon (free OSM geocoder) ───
        const searchInput = document.getElementById('searchInput');
        const resultsEl = document.getElementById('results');

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.trim();
            clearTimeout(searchTimer);
            if (q.length < 3) { resultsEl.style.display = 'none'; return; }
            // Nominatim asks for max ~1 req/sec, so wait until typing pauses (800ms)
            searchTimer = setTimeout(() => doSearch(q), 800);
        });

        async function doSearch(q) {
            showStatus('Zoeken...');
            try {
                // Nominatim free-form search. countrycodes biases to NL/BE/DE (motor-regio); remove for wereldwijd.
                const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&addressdetails=1&limit=6&accept-language=nl`;
                const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                if (!Array.isArray(data) || !data.length) {
                    showStatus('Geen resultaten voor "' + q + '"');
                    return;
                }
                showResults(data);
            } catch (e) {
                console.error('search failed', e);
                showStatus('Zoeken mislukt: ' + (e.message || 'verbinding?') + ' — probeer opnieuw.');
            }
        }

        function showStatus(msg) {
            resultsEl.innerHTML = '<div class="result-item" style="opacity:0.8;">' + msg + '</div>';
            resultsEl.style.display = 'block';
        }

        function showResults(items) {
            if (!items.length) { resultsEl.style.display = 'none'; return; }
            resultsEl.innerHTML = '';
            items.forEach(item => {
                const lat = parseFloat(item.lat);
                const lng = parseFloat(item.lon);
                const label = item.display_name || 'Onbekend';
                const div = document.createElement('div');
                div.className = 'result-item';
                div.textContent = label;
                div.onclick = () => pickResult(lat, lng, label);
                resultsEl.appendChild(div);
            });
            resultsEl.style.display = 'block';
        }

        function pickResult(lat, lng, label) {
            resultsEl.style.display = 'none';
            searchInput.value = '';
            if (searchMode === 'start') {
                setStart(lat, lng, label, false);
                setSearchMode('dest');
            } else if (searchMode === 'via') {
                addVia(lat, lng, label, true);   // zoeken = slim invoegen
            } else {
                setDest(lat, lng, label);
            }
            maybeRoute();
        }

        function setStart(lat, lng, label) {
            startPoint = { lat, lng, label };
            if (startMarker) map.removeLayer(startMarker);
            startMarker = L.marker([lat, lng], { title: 'Start' }).addTo(map).bindPopup('Start: ' + label);
            map.setView([lat, lng], 14);
        }
        function setStart(lat, lng, label, isGps) {
            startPoint = { lat, lng, label };
            if (startMarker) map.removeLayer(startMarker);
            const color = isGps ? '#E91E63' : '#9E9E9E';   // rood = eigen locatie, grijs = gekozen
            startMarker = L.marker([lat, lng], { icon: pinIcon(color) }).addTo(map);
            startMarker.on('click', () => confirmDelete('start'));
        }
        function setDest(lat, lng, label) {
            destPoint = { lat, lng, label };
            if (destMarker) map.removeLayer(destMarker);
            destMarker = L.marker([lat, lng], { icon: flagIcon() }).addTo(map);
            destMarker.on('click', () => confirmDelete('dest'));
        }

        // Add a via point. slim=true → insert into closest leg; slim=false → append.
        function addVia(lat, lng, label, slim, kind) {
            kind = kind || 'eigen';   // 'eigen' (handmatig) of 'omweg' (generator)
            const via = { lat, lng, label, kind };
            const fill = kind === 'omweg' ? '#FF9800' : '#9C27B0';  // omweg=oranje, eigen=paars
            via.marker = L.circleMarker([lat, lng], {
                radius: 14, color: '#fff', weight: 2, fillColor: fill, fillOpacity: 0.85
            }).addTo(map);
            via.marker.on('click', () => confirmDelete('via', via));

            if (!slim) {
                viaPoints.push(via);   // achteraan
                return;
            }
            // slim: insert into the closest leg of start..vias..dest
            const seq = routeSequence();
            if (seq.length < 2) { viaPoints.push(via); return; }
            let bestSeg = 0, bestD = Infinity;
            for (let i = 0; i < seq.length - 1; i++) {
                const d = distToSegment(via, seq[i], seq[i + 1]);
                if (d < bestD) { bestD = d; bestSeg = i; }
            }
            // seq = [start, via0, via1, ..., dest]; segment i sits before viaPoints index i.
            // Clamp into the viaPoints range so it can never land after the finish.
            let insertAt = bestSeg;                 // segment index → via index
            if (startPoint) insertAt = bestSeg;     // start occupies seq[0]
            insertAt = Math.max(0, Math.min(insertAt, viaPoints.length));
            viaPoints.splice(insertAt, 0, via);
        }

        // Tap on an existing point → confirm before removing.
        function confirmDelete(kind, via) {
            let what = kind === 'start' ? 'startpunt' : kind === 'dest' ? 'finish' : 'tussenpunt';
            if (!confirm(what.charAt(0).toUpperCase() + what.slice(1) + ' verwijderen?')) return;
            if (kind === 'start') {
                if (startMarker) map.removeLayer(startMarker);
                startMarker = null; startPoint = null;
            } else if (kind === 'dest') {
                if (destMarker) map.removeLayer(destMarker);
                destMarker = null; destPoint = null;
            } else if (kind === 'via' && via) {
                const i = viaPoints.indexOf(via);
                if (i !== -1) { if (via.marker) map.removeLayer(via.marker); viaPoints.splice(i, 1); }
            }
            maybeRoute();
        }

        // Vermijd-zone: rode pin + zichtbare cirkel met radius (km). Tik om aan te passen/verwijderen.
        function addNogo(lat, lng, km) {
            const radiusM = km * 1000;
            const zone = { lat, lng, radius: radiusM };
            zone.circle = L.circle([lat, lng], {
                radius: radiusM, color: '#FF1744', weight: 2,
                fillColor: '#FF1744', fillOpacity: 0.15, interactive: false
            }).addTo(map);
            zone.marker = L.marker([lat, lng], { icon: nogoIcon() }).addTo(map);
            zone.marker.on('click', () => editNogo(zone));
            nogoZones.push(zone);
        }

        function editNogo(zone) {
            const cur = (zone.radius / 1000).toFixed(1);
            const ans = prompt('Vermijd-straal in km (leeg = verwijderen):', cur);
            if (ans === null) return;                 // geannuleerd
            const km = parseFloat(ans);
            if (!km || km <= 0) {                     // leeg/0 = verwijderen
                map.removeLayer(zone.marker); map.removeLayer(zone.circle);
                nogoZones = nogoZones.filter(z => z !== zone);
            } else {
                zone.radius = km * 1000;
                zone.circle.setRadius(zone.radius);
            }
            maybeRoute();
        }

        // BRouter nogos-parameter: "lng,lat,radius[,weight]" per zone, met komma's aaneen.
        // weight maakt het ZACHT (mag erdoor als het echt niet anders kan).
        function nogosParam() {
            if (!nogoZones.length) return '';
            const parts = nogoZones.map(z => `${z.lng},${z.lat},${Math.round(z.radius)},2`);
            return '&nogos=' + parts.join(',');
        }


        // Ordered list of all points: start, vias (in order), dest
        function routeSequence() {
            const seq = [];
            if (startPoint) seq.push(startPoint);
            viaPoints.forEach(v => seq.push(v));
            if (destPoint) seq.push(destPoint);
            return seq;
        }

        // Rough distance (in degrees²) from point P to segment A-B — good enough for "closest leg".
        function distToSegment(p, a, b) {
            const ax = a.lng, ay = a.lat, bx = b.lng, by = b.lat, px = p.lng, py = p.lat;
            const dx = bx - ax, dy = by - ay;
            const len2 = dx*dx + dy*dy || 1e-9;
            let t = ((px-ax)*dx + (py-ay)*dy) / len2;
            t = Math.max(0, Math.min(1, t));
            const cx = ax + t*dx, cy = ay + t*dy;
            return (px-cx)*(px-cx) + (py-cy)*(py-cy);
        }

        // ─── Omweg-generator: gebruiker geeft gewenste km, planner zet 1 tussenpunt ───

        // Meet de routeafstand (km) langs gegeven punten via BRouter. Geeft null bij fout.
        async function measureRoute(points) {
            const lonlats = points.map(p => `${p.lng},${p.lat}`).join('|');
            const url = `https://brouter.de/brouter?lonlats=${lonlats}&${brouterParams()}${nogosParam()}&alternativeidx=0&format=geojson&turnInstructionMode=2`;
            const res = await fetch(url);
            const data = await res.json();
            const feat = data.features[0];
            const km = feat.properties['track-length'] / 1000;
            const hints = feat.properties.voicehints || [];
            const coords = feat.geometry.coordinates;
            return { km, data, hints, coords };
        }

        // Doodloper-correctie via T-splitsing-detectie.
        // Een doodlopend tongetje verraadt zich op 2 manieren:
        //   (a) een 180°-keer (TU = cmd 15), of
        //   (b) een paar TEGENGESTELDE bochten (links↔rechts) die dicht bij elkaar liggen
        //       = je gaat de doodloper in en komt bij dezelfde T-splitsing weer uit.
        // De T-splitsing (waar in+uit elkaar kruisen) ligt op de DOORGAANDE weg → daar zet
        // we de via naartoe. Geeft een nieuwe array via-punten terug.
        const LEFT_CMDS = [2,3,4,8];     // TL, TSLL, TSHL, KL
        const RIGHT_CMDS = [5,6,7,9];    // TR, TSLR, TSHR, KR

        function distMeters(aLat, aLng, bLat, bLng) {
            const dLat = (bLat - aLat) * 111000;
            const dLng = (bLng - aLng) * 111000 * Math.cos(aLat * Math.PI / 180);
            return Math.sqrt(dLat*dLat + dLng*dLng);
        }

        // DIAGNOSE: teken hoe elke via verplaatst is (oude plek → nieuwe plek op de route).
        function drawDiagnosis() {
            diagMarkers.forEach(m => map.removeLayer(m));
            diagMarkers = [];
            lastTurnSpots.forEach(s => {
                if (s.fromLat != null) {
                    // lijn van oude naar nieuwe positie
                    const line = L.polyline([[s.fromLat, s.fromLng], [s.lat, s.lng]],
                        { color: '#FF1744', weight: 2, dashArray: '4,4' }).addTo(map);
                    diagMarkers.push(line);
                    // klein rood stipje op de OUDE plek
                    const old = L.circleMarker([s.fromLat, s.fromLng], {
                        radius: 5, color: '#fff', weight: 1, fillColor: '#FF1744', fillOpacity: 0.9
                    }).addTo(map).bindPopup('via stond hier → verplaatst naar route');
                    diagMarkers.push(old);
                }
            });
        }

        // Verplaats elke opzij-via naar een punt OP de route: zoek het dichtstbijzijnde
        // routepunt bij de via, ga dan 250m verder langs de route. Zo ligt de via op een
        // rijdbare lijn (geen tongetje/doodloper mogelijk).
        function repositionUturnVias(vias, hints, coords) {
            lastTurnSpots = [];   // DIAGNOSE: reset
            if (!coords || coords.length < 2) return vias;

            return vias.map(v => {
                // 1. dichtstbijzijnde routepunt-index bij deze via
                let bestI = 0, bestD = Infinity;
                for (let i = 0; i < coords.length; i++) {
                    const d = distMeters(v.lat, v.lng, coords[i][1], coords[i][0]);
                    if (d < bestD) { bestD = d; bestI = i; }
                }
                // 2. loop 10km verder langs de route vanaf bestI
                let walked = 0, i = bestI;
                while (i < coords.length - 1 && walked < 10000) {
                    walked += distMeters(coords[i][1], coords[i][0], coords[i+1][1], coords[i+1][0]);
                    i++;
                }
                const np = coords[i];
                // DIAGNOSE: bewaar oude→nieuwe positie om te tonen
                lastTurnSpots.push({ fromLat: v.lat, fromLng: v.lng, lat: np[1], lng: np[0] });
                return { lat: np[1], lng: np[0], label: 'omweg' };
            });
        }

        // Bereken een punt loodrecht op het midden van start→finish, 'side' = +1/-1, 'offsetKm' opzij.
        function sideMidpoint(side, offsetKm) {
            const a = startPoint, b = destPoint;
            const midLat = (a.lat + b.lat) / 2, midLng = (a.lng + b.lng) / 2;
            const dLat = b.lat - a.lat, dLng = b.lng - a.lng;
            const len = Math.sqrt(dLat*dLat + dLng*dLng) || 1e-9;
            const perpLat = -dLng / len, perpLng = dLat / len;
            const offDeg = offsetKm / 111;
            const cosLat = Math.cos(midLat * Math.PI / 180) || 1;
            return {
                lat: midLat + side * perpLat * offDeg,
                lng: midLng + side * perpLng * offDeg / cosLat,
                label: 'omweg'
            };
        }

        // Plaats N punten verdeeld langs start→finish, afwisselend opzij (slinger).
        // startSide bepaalt of de eerste omhoog (+1) of omlaag (-1) gaat.
        function slalomPoints(n, offsetKm, startSide) {
            const a = startPoint, b = destPoint;
            const dLat = b.lat - a.lat, dLng = b.lng - a.lng;
            const len = Math.sqrt(dLat*dLat + dLng*dLng) || 1e-9;
            const perpLat = -dLng / len, perpLng = dLat / len;
            const offDeg = offsetKm / 111;
            const pts = [];
            for (let i = 1; i <= n; i++) {
                const t = i / (n + 1);                 // verdeel op 1/(n+1), 2/(n+1), ...
                const baseLat = a.lat + dLat * t, baseLng = a.lng + dLng * t;
                const side = (startSide > 0)
                    ? (i % 2 === 1 ? 1 : -1)           // +,-,+,-...
                    : (i % 2 === 1 ? -1 : 1);          // -,+,-,+...
                const cosLat = Math.cos(baseLat * Math.PI / 180) || 1;
                pts.push({
                    lat: baseLat + side * perpLat * offDeg,
                    lng: baseLng + side * perpLng * offDeg / cosLat,
                    label: 'omweg'
                });
            }
            return pts;
        }

        let detourStartSide = 1;   // +1 = eerste punt omhoog; wisselt bij elke generatie

        async function generateDetour() {
            if (!startPoint || !destPoint) { alert('Zet eerst start en finish.'); return; }
            const target = parseFloat(document.getElementById('targetKm').value);
            if (!target || target < 1) { alert('Vul een gewenste afstand in (km).'); return; }
            let nPts = parseInt(document.getElementById('targetPts').value);
            if (!nPts || nPts < 1) nPts = 1;           // leeg = 1 punt

            showInfo('Omweg zoeken...');
            try {
                // eigen via's (handmatig) blijven staan en tellen mee als basis
                const ownVias = viaPoints.filter(v => v.kind !== 'omweg');
                const base = await measureRoute([startPoint, ...ownVias, destPoint]);
                if (target <= base.km + 5) {
                    showInfo(`Route is al ${base.km.toFixed(1)} km — kies een grotere afstand.`);
                    return;
                }
                const extra = target - base.km;
                // begin-schatting: zijwaartse afstand. Meer punten → elk minder ver opzij.
                let offset = (extra / 2) / Math.sqrt(nPts);
                const startSide = detourStartSide;

                // Meet de EINDafstand: slalom → verankeren op route → opnieuw meten.
                // Zo stuurt de lus op de afstand ná correctie (die kleiner wordt door afsnijden).
                async function measureAnchored(off) {
                    const pts = slalomPoints(nPts, off, startSide);
                    const seq1 = [startPoint, ...ownVias, ...pts, destPoint];
                    const m1 = await measureRoute(seq1);
                    const anchored = repositionUturnVias(pts, m1.hints, m1.coords);
                    const m2 = await measureRoute([startPoint, ...ownVias, ...anchored, destPoint]);
                    return { km: m2.km, pts: anchored };
                }

                let best = null, bestDiff = Infinity;
                for (let i = 0; i < 6; i++) {
                    let r;
                    try { r = await measureAnchored(offset); }
                    catch (e) { break; }
                    const diff = Math.abs(r.km - target);
                    if (diff < bestDiff) { bestDiff = diff; best = { pts: r.pts, km: r.km }; }
                    if (diff <= 5) break;
                    // bijsturen op de EINDafstand
                    if (r.km < target) offset *= Math.max(1.1, (extra / Math.max(r.km - base.km, 1)));
                    else offset *= 0.7;
                    offset = Math.max(0.3, Math.min(offset, extra * 2));   // ruimer plafond (compenseert krimp)
                }

                if (!best) { showInfo('Omweg zoeken mislukt — probeer opnieuw.'); return; }

                // SCHONE HEROPBOUW (jouw aanpak):
                // 1. eigen via's zijn al bewaard in ownVias (met hun volgorde)
                // 2. wis ALLE via's van de kaart → schone lei
                viaPoints.forEach(v => { if (v.marker) map.removeLayer(v.marker); });
                viaPoints = [];
                // 3. zet de eigen via's terug op hun oorspronkelijke plek (paars)
                ownVias.forEach(v => addVia(v.lat, v.lng, v.label, false, 'eigen'));
                // 4. weef de nieuwe omweg-via's ertussen (slim invoegen op geografische plek, oranje)
                best.pts.forEach(p => addVia(p.lat, p.lng, 'omweg', true, 'omweg'));
                await maybeRoute();
                showInfo(document.getElementById('infoBar').innerHTML + ` &nbsp;(doel ${target} km)`);
                drawDiagnosis();

                detourStartSide = -detourStartSide;
            } catch (e) {
                console.error('detour failed', e);
                showInfo('Omweg zoeken mislukt — probeer opnieuw.');
            }
        }

        function useMyLocation() {
            if (!navigator.geolocation) { alert('Geen GPS beschikbaar'); return; }
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const { latitude, longitude } = pos.coords;
                    setStart(latitude, longitude, 'Mijn locatie', true);
                    setSearchMode('dest');
                    maybeRoute();
                },
                () => alert('Locatie ophalen mislukt'),
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        // ─── Route via BRouter (free public server) ───
        async function maybeRoute() {
            const seq = routeSequence();
            if (seq.length < 2) return;   // need at least start + dest
            showInfo('Route berekenen...');
            try {
                // all points in order: start|via|via|...|dest  as lon,lat
                const lonlats = seq.map(p => `${p.lng},${p.lat}`).join('|');
                const url = `https://brouter.de/brouter?lonlats=${lonlats}&${brouterParams()}${nogosParam()}&alternativeidx=0&format=geojson&turnInstructionMode=2`;
                const res = await fetch(url);
                const data = await res.json();
                drawRoute(data);
                const turns = processTurns(data);   // echte afslagen op de kaart
                if (turns.length) {
                    showInfo(document.getElementById('infoBar').innerHTML +
                        ` &nbsp; <b>${turns.length}</b> afslagen`);
                }
            } catch (e) {
                console.error('route failed', e);
                showInfo('Route berekenen mislukt — probeer opnieuw.');
            }
        }

        // BRouter voice-hint command codes → leesbare NL richting
        const TURN_NAMES = {
            1: 'rechtdoor', 2: 'links', 3: 'flauw links', 4: 'scherp links',
            5: 'rechts', 6: 'flauw rechts', 7: 'scherp rechts',
            8: 'links aanhouden', 9: 'rechts aanhouden',
            10: 'keren (links)', 11: 'keren (rechts)', 12: 'van route',
            13: 'rotonde', 14: 'rotonde links', 15: '180° keren',
            16: 'rechte lijn', 17: 'afrit links', 18: 'afrit rechts'
        };
        let turnMarkers = [];

        // Turn the BRouter voicehints into map markers on the real turn points.
        // voicehint = [trackPointIndex, command, ?, distanceToNext, angle]
        function processTurns(geojson) {
            // clear old
            turnMarkers.forEach(m => map.removeLayer(m));
            turnMarkers = [];
            try {
                const feat = geojson.features[0];
                const coords = feat.geometry.coordinates;   // [ [lng,lat,ele], ... ]
                const hints = feat.properties.voicehints || [];
                let list = [];
                hints.forEach(h => {
                    const idx = h[0];          // index into coords
                    const cmd = h[1];          // command code
                    if (cmd === 1) return;     // skip plain "rechtdoor"
                    const pt = coords[idx];
                    if (!pt) return;
                    const lat = pt[1], lng = pt[0];
                    const name = TURN_NAMES[cmd] || ('cmd ' + cmd);
                    const isLeft = [2,3,4,8,10,14,17].includes(cmd);
                    const color = isLeft ? '#2196F3' : '#FF9800';
                    const m = L.circleMarker([lat, lng], {
                        radius: 7, color: '#fff', weight: 2, fillColor: color, fillOpacity: 0.9
                    }).addTo(map).bindPopup(name);
                    turnMarkers.push(m);
                    list.push(name);
                });
                return list;
            } catch (e) {
                console.error('processTurns', e);
                return [];
            }
        }

        function drawRoute(geojson) {
            if (routeLine) map.removeLayer(routeLine);
            routeLine = L.geoJSON(geojson, {
                style: { color: '#00BCD4', weight: 6, opacity: 0.9 },
                interactive: false   // lijn vangt geen kliks → via's blijven aantikbaar
            }).addTo(map);
            // bewaar de route-coördinaten zodat eigen via's hierop kunnen 'snappen'
            try { lastRouteCoords = geojson.features[0].geometry.coordinates; } catch (e) {}
            // Alleen de allereerste keer inzoomen op de route; daarna je eigen zoom/positie houden.
            if (!hasFitOnce) {
                map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
                hasFitOnce = true;
            }

            // Pull distance & time from BRouter properties if present
            let info = '';
            try {
                const props = geojson.features[0].properties;
                const km = (props['track-length'] / 1000).toFixed(1);
                const min = Math.round(props['total-time'] / 60);
                info = `<b>Afstand:</b> ${km} km &nbsp; <b>Tijd:</b> ${min} min`;
            } catch (e) {
                info = 'Route gevonden.';
            }
            showInfo(info);
            // via's, start en finish bovenop de route houden zodat ze aantikbaar blijven
            viaPoints.forEach(v => { if (v.marker && v.marker.bringToFront) v.marker.bringToFront(); });
            if (startMarker && startMarker.bringToFront) startMarker.bringToFront();
            if (destMarker && destMarker.bringToFront) destMarker.bringToFront();
        }

        function showInfo(html) {
            const bar = document.getElementById('infoBar');
            bar.innerHTML = html;
            bar.style.display = 'block';
        }

        function clearAll() {
            startPoint = destPoint = null;
            viaPoints.forEach(v => { if (v.marker) map.removeLayer(v.marker); });
            viaPoints = [];
            nogoZones.forEach(z => { if (z.marker) map.removeLayer(z.marker); if (z.circle) map.removeLayer(z.circle); });
            nogoZones = [];
            [startMarker, destMarker, routeLine].forEach(l => { if (l) map.removeLayer(l); });
            startMarker = destMarker = routeLine = null;
            hasFitOnce = false;   // nieuwe route mag weer 1x inzoomen
            document.getElementById('infoBar').style.display = 'none';
            turnMarkers.forEach(m => map.removeLayer(m));
            turnMarkers = [];
            diagMarkers.forEach(m => map.removeLayer(m));
            diagMarkers = [];
            searchInput.value = '';
            resultsEl.style.display = 'none';
            setSearchMode('start');
        }
    </script>
</body>
