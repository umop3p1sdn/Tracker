<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Route Planner v0.5</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: sans-serif; background: #0a0e27; }
        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

        /* Search box top-left */
        #searchWrap {
            position: absolute; top: 12px; left: 12px; right: 70px; z-index: 1000;
        }
        #searchBar {
            display: flex; align-items: center; gap: 8px;
            background: #0a0e27; border: 2px solid #00BCD4; border-radius: 10px;
            padding: 8px 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        #searchIcon { flex-shrink: 0; cursor: pointer; }
        #searchInput {
            flex: 1; border: none; background: transparent; color: #fff;
            font-size: 1em; outline: none;
        }
        #searchInput::placeholder { color: #889; }
        #results {
            margin-top: 6px; background: #0a0e27; border-radius: 10px;
            overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            display: none;
        }
        .result-item {
            padding: 10px 14px; color: #fff; cursor: pointer; font-size: 0.9em;
            border-bottom: 1px solid #1a2148;
        }
        .result-item:last-child { border-bottom: none; }
        .result-item:active { background: #1a2148; }

        /* Mode toggle: searching for start vs destination */
        #modeRow {
            display: flex; gap: 6px; margin-top: 6px;
        }
        .mode-btn {
            flex: 1; padding: 8px; border-radius: 8px; border: 2px solid #00BCD4;
            background: transparent; color: #00BCD4; font-weight: bold; font-size: 0.8em;
            cursor: pointer;
        }
        .mode-btn.active { background: #00BCD4; color: #0a0e27; }

        /* Info bar bottom */
        #infoBar {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(10,14,39,0.92); color: #fff; padding: 12px 16px;
            font-size: 0.9em; display: none;
        }
        #infoBar b { color: #00BCD4; }
        #clearBtn {
            position: absolute; top: 12px; right: 12px; z-index: 1000;
            width: 48px; height: 48px; border-radius: 10px;
            background: #0a0e27; border: 2px solid #E91E63; color: #E91E63;
            font-size: 1.4em; cursor: pointer;
        }
        .leaflet-routing-marker { background: transparent; border: none; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="searchWrap">
        <div id="searchBar">
            <svg id="searchIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00BCD4" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
            <input id="searchInput" type="text" placeholder="Zoek adres of straat..." autocomplete="off">
        </div>
        <div id="modeRow">
            <button class="mode-btn active" id="modeStart" onclick="setSearchMode('start')">Start</button>
            <button class="mode-btn" id="modeDest" onclick="setSearchMode('dest')">Bestemming</button>
            <button class="mode-btn" id="useGps" onclick="useMyLocation()" style="flex:0 0 auto; border-color:#4CAF50; color:#4CAF50;">📍</button>
        </div>
        <div id="results"></div>
    </div>

    <button id="clearBtn" onclick="clearAll()" title="Wissen">✕</button>

    <div id="infoBar"></div>

    <script>
        // ─── Map setup (same tiles as the tracker) ───
        const map = L.map('map', { zoomControl: true }).setView([52.04, 5.66], 13); // Ede default
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19, attribution: '© OpenStreetMap'
        }).addTo(map);

        let startPoint = null;      // {lat, lng, label}
        let destPoint = null;       // {lat, lng, label}
        let startMarker = null, destMarker = null, routeLine = null;
        let searchMode = 'start';   // which point the search fills
        let searchTimer = null;

        function setSearchMode(mode) {
            searchMode = mode;
            document.getElementById('modeStart').classList.toggle('active', mode === 'start');
            document.getElementById('modeDest').classList.toggle('active', mode === 'dest');
            document.getElementById('searchInput').placeholder =
                mode === 'start' ? 'Zoek startadres...' : 'Zoek bestemming...';
        }

        // ─── Address search via Photon (free OSM geocoder) ───
        const searchInput = document.getElementById('searchInput');
        const resultsEl = document.getElementById('results');

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.trim();
            clearTimeout(searchTimer);
            if (q.length < 3) { resultsEl.style.display = 'none'; return; }
            // Nominatim asks for max ~1 req/sec, so wait until typing pauses (800ms)
            searchTimer = setTimeout(() => doSearch(q), 800);
        });

        async function doSearch(q) {
            showStatus('Zoeken...');
            try {
                // Nominatim free-form search. countrycodes biases to NL/BE/DE (motor-regio); remove for wereldwijd.
                const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&addressdetails=1&limit=6&accept-language=nl`;
                const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                if (!Array.isArray(data) || !data.length) {
                    showStatus('Geen resultaten voor "' + q + '"');
                    return;
                }
                showResults(data);
            } catch (e) {
                console.error('search failed', e);
                showStatus('Zoeken mislukt: ' + (e.message || 'verbinding?') + ' — probeer opnieuw.');
            }
        }

        function showStatus(msg) {
            resultsEl.innerHTML = '<div class="result-item" style="opacity:0.8;">' + msg + '</div>';
            resultsEl.style.display = 'block';
        }

        function showResults(items) {
            if (!items.length) { resultsEl.style.display = 'none'; return; }
            resultsEl.innerHTML = '';
            items.forEach(item => {
                const lat = parseFloat(item.lat);
                const lng = parseFloat(item.lon);
                const label = item.display_name || 'Onbekend';
                const div = document.createElement('div');
                div.className = 'result-item';
                div.textContent = label;
                div.onclick = () => pickResult(lat, lng, label);
                resultsEl.appendChild(div);
            });
            resultsEl.style.display = 'block';
        }

        function pickResult(lat, lng, label) {
            resultsEl.style.display = 'none';
            searchInput.value = '';
            if (searchMode === 'start') {
                setStart(lat, lng, label);
                setSearchMode('dest');   // next, look for destination
            } else {
                setDest(lat, lng, label);
            }
            maybeRoute();
        }

        function setStart(lat, lng, label) {
            startPoint = { lat, lng, label };
            if (startMarker) map.removeLayer(startMarker);
            startMarker = L.marker([lat, lng], { title: 'Start' }).addTo(map).bindPopup('Start: ' + label);
            map.setView([lat, lng], 14);
        }
        function setDest(lat, lng, label) {
            destPoint = { lat, lng, label };
            if (destMarker) map.removeLayer(destMarker);
            destMarker = L.marker([lat, lng], { title: 'Bestemming' }).addTo(map).bindPopup('Bestemming: ' + label);
        }

        function useMyLocation() {
            if (!navigator.geolocation) { alert('Geen GPS beschikbaar'); return; }
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const { latitude, longitude } = pos.coords;
                    setStart(latitude, longitude, 'Mijn locatie');
                    setSearchMode('dest');
                    maybeRoute();
                },
                () => alert('Locatie ophalen mislukt'),
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        // ─── Route via BRouter (free public server) ───
        async function maybeRoute() {
            if (!startPoint || !destPoint) return;
            showInfo('Route berekenen...');
            try {
                // BRouter wants lon,lat pairs. profile: car-fast for now.
                // turnInstructionMode=2 → voice hints in the GeoJSON output.
                const lonlats = `${startPoint.lng},${startPoint.lat}|${destPoint.lng},${destPoint.lat}`;
                const url = `https://brouter.de/brouter?lonlats=${lonlats}&profile=car-fast&alternativeidx=0&format=geojson&turnInstructionMode=2`;
                const res = await fetch(url);
                const data = await res.json();
                drawRoute(data);
                const turns = processTurns(data);   // echte afslagen op de kaart
                if (turns.length) {
                    showInfo(document.getElementById('infoBar').innerHTML +
                        ` &nbsp; <b>${turns.length}</b> afslagen`);
                }
            } catch (e) {
                console.error('route failed', e);
                showInfo('Route berekenen mislukt — probeer opnieuw.');
            }
        }

        // BRouter voice-hint command codes → leesbare NL richting
        const TURN_NAMES = {
            1: 'rechtdoor', 2: 'links', 3: 'flauw links', 4: 'scherp links',
            5: 'rechts', 6: 'flauw rechts', 7: 'scherp rechts',
            8: 'links aanhouden', 9: 'rechts aanhouden',
            10: 'keren (links)', 11: 'keren (rechts)', 12: 'van route',
            13: 'rotonde', 14: 'rotonde links', 15: '180° keren',
            16: 'rechte lijn', 17: 'afrit links', 18: 'afrit rechts'
        };
        let turnMarkers = [];

        // Turn the BRouter voicehints into map markers on the real turn points.
        // voicehint = [trackPointIndex, command, ?, distanceToNext, angle]
        function processTurns(geojson) {
            // clear old
            turnMarkers.forEach(m => map.removeLayer(m));
            turnMarkers = [];
            try {
                const feat = geojson.features[0];
                const coords = feat.geometry.coordinates;   // [ [lng,lat,ele], ... ]
                const hints = feat.properties.voicehints || [];
                let list = [];
                hints.forEach(h => {
                    const idx = h[0];          // index into coords
                    const cmd = h[1];          // command code
                    if (cmd === 1) return;     // skip plain "rechtdoor"
                    const pt = coords[idx];
                    if (!pt) return;
                    const lat = pt[1], lng = pt[0];
                    const name = TURN_NAMES[cmd] || ('cmd ' + cmd);
                    const isLeft = [2,3,4,8,10,14,17].includes(cmd);
                    const color = isLeft ? '#2196F3' : '#FF9800';
                    const m = L.circleMarker([lat, lng], {
                        radius: 7, color: '#fff', weight: 2, fillColor: color, fillOpacity: 0.9
                    }).addTo(map).bindPopup(name);
                    turnMarkers.push(m);
                    list.push(name);
                });
                return list;
            } catch (e) {
                console.error('processTurns', e);
                return [];
            }
        }

        function drawRoute(geojson) {
            if (routeLine) map.removeLayer(routeLine);
            routeLine = L.geoJSON(geojson, {
                style: { color: '#00BCD4', weight: 6, opacity: 0.9 }
            }).addTo(map);
            map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });

            // Pull distance & time from BRouter properties if present
            let info = '';
            try {
                const props = geojson.features[0].properties;
                const km = (props['track-length'] / 1000).toFixed(1);
                const min = Math.round(props['total-time'] / 60);
                info = `<b>Afstand:</b> ${km} km &nbsp; <b>Tijd:</b> ${min} min`;
            } catch (e) {
                info = 'Route gevonden.';
            }
            showInfo(info);
        }

        function showInfo(html) {
            const bar = document.getElementById('infoBar');
            bar.innerHTML = html;
            bar.style.display = 'block';
        }

        function clearAll() {
            startPoint = destPoint = null;
            [startMarker, destMarker, routeLine].forEach(l => { if (l) map.removeLayer(l); });
            startMarker = destMarker = routeLine = null;
            document.getElementById('infoBar').style.display = 'none';
            turnMarkers.forEach(m => map.removeLayer(m));
            turnMarkers = [];
            searchInput.value = '';
            resultsEl.style.display = 'none';
            setSearchMode('start');
        }
    </script>
</body>
</html>
